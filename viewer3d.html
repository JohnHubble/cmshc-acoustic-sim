<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0e17; color: #c8d6e5; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
nav { background: #111827; border-bottom: 1px solid #1e2d3d; padding: 12px 30px; display: flex; gap: 20px; align-items: center; flex-shrink: 0; }
nav a { color: #6b7c93; text-decoration: none; font-size: 0.85rem; padding: 6px 14px; border-radius: 6px; transition: all 0.2s; }
nav a:hover { color: #2e86de; background: #0d1a2d; }
nav a.active { color: #2e86de; background: #0d1a2d; border: 1px solid #2e86de; }
nav .logo { font-size: 1rem; font-weight: 600; color: #e8ecf1; letter-spacing: 0.03em; margin-right: auto; }
.main { display: flex; flex: 1; overflow: hidden; }
#sidebar { width: 260px; background: #111827; border-right: 1px solid #1e2d3d; padding: 16px; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; gap: 18px; }
#canvas-wrap { flex: 1; position: relative; }
#canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }
.section-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7c93; margin-bottom: 8px; }
.btn-group { display: flex; flex-direction: column; gap: 4px; }
.btn { background: #1e2d3d; border: 1px solid #2a3f5f; color: #c8d6e5; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; text-align: left; transition: all 0.15s; }
.btn:hover { background: #0d1a2d; border-color: #2e86de; }
.btn.active { background: #0d1a2d; border-color: #2e86de; color: #2e86de; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
.toggle-label { font-size: 0.82rem; color: #c8d6e5; }
.toggle { position: relative; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #2a3f5f; border-radius: 10px; transition: 0.2s; }
.toggle-slider:before { content: ""; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #6b7c93; border-radius: 50%; transition: 0.2s; }
input:checked + .toggle-slider { background: #2e86de; }
input:checked + .toggle-slider:before { transform: translateX(16px); background: white; }
.slider-row { display: flex; flex-direction: column; gap: 4px; }
.slider-row input[type=range] { width: 100%; accent-color: #2e86de; }
.slider-val { font-size: 0.75rem; color: #6b7c93; text-align: right; }
#desc-bar { background: #111827; border-top: 1px solid #1e2d3d; padding: 8px 20px; font-size: 0.78rem; color: #6b7c93; flex-shrink: 0; min-height: 32px; }
</style>
</head>

    <div>

</div>

function energyToColor(e) {
  // 0=dim blue, 0.5=green, 1=bright yellow
  const r = Math.min(1, e * 2);
  const g = Math.min(1, e * 2);
  const b = Math.max(0, 1 - e * 3);
  return { r, g, b };
}

function buildHeatmapCanvas(heatmap, floorRadius) {
  const res = heatmap.grid_res;
  const vals = heatmap.values;
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0e17';
  ctx.fillRect(0, 0, size, size);

  const imgData = ctx.getImageData(0, 0, size, size);
  const px = imgData.data;

  for (let zi = 0; zi < res; zi++) {
    for (let xi = 0; xi < res; xi++) {
      const v = vals[zi * res + xi];
      if (v < 0) continue; // outside disk

      // Map to canvas coords
      const cx = Math.floor(xi / res * size);
      const cz = Math.floor(zi / res * size);
      const cw = Math.ceil(size / res) + 1;
      const ch = Math.ceil(size / res) + 1;

      // RdYlBu_r-like colormap: 0=blue, 0.5=yellow, 1=red
      let r, g, b;
      if (v < 0.5) {
        const t = v * 2;
        r = Math.round(t * 255);
        g = Math.round(t * 200);
        b = Math.round((1 - t) * 200 + 50);
      } else {
        const t = (v - 0.5) * 2;
        r = 255;
        g = Math.round((1 - t) * 200);
        b = 0;
      }

      for (let dz = 0; dz < ch && cz + dz < size; dz++) {
        for (let dx = 0; dx < cw && cx + dx < size; dx++) {
          const idx = ((cz + dz) * size + (cx + dx)) * 4;
          px[idx] = r; px[idx+1] = g; px[idx+2] = b; px[idx+3] = 220;
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
}

function buildDomeMesh(room) {
  const R = room.inner_radius;
  const ch = room.center_height;
  const af = room.angle_floor;

  // Translucent dome shell
  const geo = new THREE.SphereGeometry(R, 48, 32, 0, Math.PI * 2, 0, af);
  const mat = new THREE.MeshPhongMaterial({
    color: 0x1a2a3a,
    transparent: true,
    opacity: 0.35,
    side: THREE.BackSide,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = ch;

  // Wireframe overlay
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x2a4060,
    wireframe: true,
    transparent: true,
    opacity: 0.15,
  });
  const wireMesh = new THREE.Mesh(geo.clone(), wireMat);
  wireMesh.position.y = ch;
  wireMesh.visible = false;

  return { mesh, wireMesh };
}

function buildFloor(room) {
  const geo = new THREE.CircleGeometry(room.floor_radius, 64);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x0d1520,
    transparent: true,
    opacity: 0.9,
    side: THREE.DoubleSide,
  });
  const floor = new THREE.Mesh(geo, mat);
  return floor;
}

function buildFloorHeatmap(room, heatmap) {
  const canvas = buildHeatmapCanvas(heatmap, room.floor_radius);
  const tex = new THREE.CanvasTexture(canvas);
  const geo = new THREE.CircleGeometry(room.floor_radius * 0.999, 64);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    opacity: 0.85,
    side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = 0.005; // slightly above floor to avoid z-fighting
  return mesh;
}

function buildZoneMeshes(room, zones) {
  const R = room.inner_radius;
  const ch = room.center_height;
  const group = new THREE.Group();

  const diffStart = zones.diffusers.angle_start;
  const diffLen = zones.diffusers.angle_end - diffStart;
  const diffGeo = new THREE.SphereGeometry(R * 0.99, 48, 24, 0, Math.PI * 2, diffStart, diffLen);
  const diffMat = new THREE.MeshBasicMaterial({
    color: 0x2e86de, transparent: true, opacity: 0.18, side: THREE.BackSide,
  });
  const diffMesh = new THREE.Mesh(diffGeo, diffMat);
  diffMesh.position.y = ch;
  group.add(diffMesh);

  const absStart = zones.absorbers.angle_start;
  const absLen = zones.absorbers.angle_end - absStart;
  const absGeo = new THREE.SphereGeometry(R * 0.99, 48, 24, 0, Math.PI * 2, absStart, absLen);
  const absMat = new THREE.MeshBasicMaterial({
    color: 0xf39c12, transparent: true, opacity: 0.14, side: THREE.BackSide,
  });
  const absMesh = new THREE.Mesh(absGeo, absMat);
  absMesh.position.y = ch;
  group.add(absMesh);

  return group;
}

function buildRayLines(segments, maxSegs) {
  // segments: flat array [x0,y0,z0, x1,y1,z1, e, ...]
  const n = Math.floor(segments.length / 7);
  const count = Math.min(n, maxSegs || n);

  const positions = new Float32Array(count * 6);
  const colors = new Float32Array(count * 6);

  for (let i = 0; i < count; i++) {
    const base = i * 7;
    const e = segments[base + 6];
    const c = energyToColor(e);

    positions[i*6+0] = segments[base+0];
    positions[i*6+1] = segments[base+1];
    positions[i*6+2] = segments[base+2];
    positions[i*6+3] = segments[base+3];
    positions[i*6+4] = segments[base+4];
    positions[i*6+5] = segments[base+5];

    for (let v = 0; v < 2; v++) {
      colors[i*6 + v*3 + 0] = c.r;
      colors[i*6 + v*3 + 1] = c.g;
      colors[i*6 + v*3 + 2] = c.b;
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.40,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  return new THREE.LineSegments(geo, mat);
}

function buildSourceMarker(height) {
  const geo = new THREE.SphereGeometry(0.12, 16, 16);
  const mat = new THREE.MeshBasicMaterial({ color: 0x27ae60 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(0, height, 0);

  // Glow ring
  const ringGeo = new THREE.RingGeometry(0.2, 0.28, 32);
  ringGeo.rotateX(-Math.PI / 2);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x27ae60, transparent: true, opacity: 0.4, side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.set(0, height + 0.02, 0);

  const group = new THREE.Group();
  group.add(mesh, ring);
  return group;
}

// ── Room setup ────────────────────────────────────────────────────────────────

function initRoom(roomKey) {
  const room = DATA.rooms[roomKey];
  const group = new THREE.Group();

  const { mesh: domeMesh, wireMesh } = buildDomeMesh(room);
  const floor = buildFloor(room);

  // Floor edge ring
  const edgeGeo = new THREE.RingGeometry(room.floor_radius - 0.03, room.floor_radius + 0.03, 80);
  edgeGeo.rotateX(-Math.PI / 2);
  const edge = new THREE.Mesh(edgeGeo, new THREE.MeshBasicMaterial({ color: 0x3a4f6f, side: THREE.DoubleSide }));

  group.add(domeMesh, wireMesh, floor, edge);

  // Placeholders updated per scenario
  const state = {
    group,
    domeMesh,
    wireMesh,
    floor,
    heatmapMesh: null,
    zoneMeshes: null,
    rayLines: null,
    sourceMarker: null,
  };
  roomObjects[roomKey] = state;
  scene.add(group);
  return state;
}

function updateScenario(roomKey, scenarioName) {
  const roomData = DATA.rooms[roomKey];
  const sc = roomData.scenarios[scenarioName];
  const state = roomObjects[roomKey];

  // Remove old scenario objects
  if (state.heatmapMesh) { state.group.remove(state.heatmapMesh); state.heatmapMesh.geometry.dispose(); state.heatmapMesh.material.map?.dispose(); state.heatmapMesh.material.dispose(); }
  if (state.zoneMeshes) { state.group.remove(state.zoneMeshes); }
  if (state.rayLines) { state.group.remove(state.rayLines); state.rayLines.geometry.dispose(); }
  if (state.sourceMarker) { state.group.remove(state.sourceMarker); }

  // Heatmap on floor
  const hm = buildFloorHeatmap(roomData, sc.heatmap);
  state.group.add(hm);
  state.heatmapMesh = hm;
  hm.visible = document.getElementById('tog-heatmap').checked;

  // Zone meshes
  const zm = buildZoneMeshes(roomData, sc.zones);
  state.group.add(zm);
  state.zoneMeshes = zm;
  zm.visible = document.getElementById('tog-zones').checked;

  // Ray lines
  const rl = buildRayLines(sc.segments);
  state.group.add(rl);
  state.rayLines = rl;
  rl.visible = document.getElementById('tog-rays').checked;
  rl.material.opacity = parseInt(document.getElementById('ray-opacity').value) / 100;

  // Source marker
  const sm = buildSourceMarker(sc.source_height);
  state.group.add(sm);
  state.sourceMarker = sm;

  // Description bar
  document.getElementById('desc-bar').textContent = sc.description;

  currentScenario = scenarioName;
}

// ── UI ────────────────────────────────────────────────────────────────────────

function populateRoomButtons() {
  const container = document.getElementById('room-btns');
  container.innerHTML = '';
  DATA.room_order.forEach(key => {
    const room = DATA.rooms[key];
    const btn = document.createElement('button');
    btn.className = 'btn' + (key === currentRoomKey ? ' active' : '');
    btn.textContent = room.name;
    btn.onclick = () => switchRoom(key);
    container.appendChild(btn);
  });
}

function populateScenarioButtons(roomKey) {
  const container = document.getElementById('scenario-btns');
  container.innerHTML = '';
  const room = DATA.rooms[roomKey];
  room.scenario_order.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'btn' + (name === currentScenario ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => switchScenario(name);
    container.appendChild(btn);
  });
}

function switchRoom(key) {
  // Hide all rooms
  Object.keys(roomObjects).forEach(k => {
    roomObjects[k].group.visible = false;
  });

  currentRoomKey = key;

  // Init if not yet built
  if (!roomObjects[key]) initRoom(key);
  roomObjects[key].group.visible = true;

  // Reset camera for this room's scale
  const room = DATA.rooms[key];
  const R = room.inner_radius;
  camera.position.set(R * 1.6, room.headroom * 0.8, R * 1.6);
  controls.target.set(0, room.headroom * 0.35, 0);
  controls.update();

  populateRoomButtons();
  populateScenarioButtons(key);

  // Load first scenario
  const firstSc = DATA.rooms[key].scenario_order[0];
  updateScenario(key, firstSc);
  populateScenarioButtons(key); // refresh active state
}

function switchScenario(name) {
  updateScenario(currentRoomKey, name);
  populateScenarioButtons(currentRoomKey); // refresh active state
}

// Toggle handlers
document.getElementById('tog-rays').onchange = e => {
  Object.values(roomObjects).forEach(s => { if (s.rayLines) s.rayLines.visible = e.target.checked; });
};
document.getElementById('tog-heatmap').onchange = e => {
  Object.values(roomObjects).forEach(s => { if (s.heatmapMesh) s.heatmapMesh.visible = e.target.checked; });
};
document.getElementById('tog-zones').onchange = e => {
  Object.values(roomObjects).forEach(s => { if (s.zoneMeshes) s.zoneMeshes.visible = e.target.checked; });
};
document.getElementById('tog-wire').onchange = e => {
  Object.values(roomObjects).forEach(s => { s.wireMesh.visible = e.target.checked; });
};
document.getElementById('ray-opacity').oninput = e => {
  const val = parseInt(e.target.value);
  document.getElementById('ray-opacity-val').textContent = val + '%';
  Object.values(roomObjects).forEach(s => { if (s.rayLines) s.rayLines.material.opacity = val / 100; });
};

// ── Resize ────────────────────────────────────────────────────────────────────

function onResize() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ── Render loop ───────────────────────────────────────────────────────────────

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ── Init ──────────────────────────────────────────────────────────────────────

populateRoomButtons();
onResize();
switchRoom(DATA.room_order[0]);
animate();

</script>
