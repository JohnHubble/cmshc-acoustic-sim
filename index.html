let currentRoom = Object.keys(DATA)[0];
let currentScenario = Object.keys(DATA[currentRoom].scenarios)[0];

function init() {
  // Room buttons
  const roomBtns = document.getElementById('room-btns');
  for (const key of Object.keys(DATA)) {
    const btn = document.createElement('button');
    btn.className = 'btn' + (key === currentRoom ? ' active' : '');
    btn.textContent = DATA[key].name;
    btn.onclick = () => { currentRoom = key; currentScenario = Object.keys(DATA[key].scenarios)[0]; update(); };
    roomBtns.appendChild(btn);
  }
  buildScenarioButtons();
  update();
}

function buildScenarioButtons() {
  const container = document.getElementById('scenario-btns');
  container.innerHTML = '';
  const room = DATA[currentRoom];
  for (const key of Object.keys(room.scenarios)) {
    const btn = document.createElement('button');
    btn.className = 'btn' + (key === currentScenario ? ' active' : '');
    btn.textContent = room.scenarios[key].name;
    btn.onclick = () => { currentScenario = key; update(); };
    container.appendChild(btn);
  }
}

function update() {
  // Update button states
  document.querySelectorAll('#room-btns .btn').forEach((b, i) => {
    b.className = 'btn' + (Object.keys(DATA)[i] === currentRoom ? ' active' : '');
  });
  buildScenarioButtons();

  const room = DATA[currentRoom];
  const scenario = room.scenarios[currentScenario];

  drawRays(room, scenario);
  drawRT60(room, scenario);
  drawEnergy(room, scenario);
  updateStats(room, scenario);
}

function drawRays(room, scenario) {
  const W = 580, H = 420;
  const R = room.inner_radius;
  const ch = room.center_height;
  const fr = room.floor_radius;

  // Scale: fit dome in viewport with padding
  const scale = (W * 0.42) / R;
  const cx = W / 2, floorY = H - 50;

  function tx(x) { return cx + x * scale; }
  function ty(y) { return floorY - y * scale; }

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;

  // Dome shell
  const pts = [];
  const steps = 200;
  const af = room.angle_floor;
  for (let i = 0; i <= steps; i++) {
    const a = af - (2 * af * i / steps);
    const x = R * Math.sin(a);
    const y = ch + R * Math.cos(a);
    pts.push(`${tx(x).toFixed(1)},${ty(y).toFixed(1)}`);
  }
  svg += `<polygon points="${pts.join(' ')}" fill="#16131c" stroke="#4a3d5c" stroke-width="1.5"/>`;

  // Treatment zones — hidden for Untreated scenario
  const zones = scenario.zones;
  const isUntreated = scenario.name === 'Untreated';
  if (!isUntreated) {
    // Diffusers (both sides)
    for (const sign of [1, -1]) {
      let zPts = [];
      for (let i = 0; i <= 60; i++) {
        const a = zones.diffusers.angle_start + (zones.diffusers.angle_end - zones.diffusers.angle_start) * i / 60;
        const x = sign * R * Math.sin(a);
        const y = ch + R * Math.cos(a);
        zPts.push(`${tx(x).toFixed(1)},${ty(y).toFixed(1)}`);
      }
      svg += `<polyline points="${zPts.join(' ')}" fill="none" stroke="#6b8fc4" stroke-width="6" stroke-opacity="0.3" stroke-linecap="round"/>`;
    }
    // Absorbers
    for (const sign of [1, -1]) {
      let zPts = [];
      for (let i = 0; i <= 60; i++) {
        const a = zones.absorbers.angle_start + (zones.absorbers.angle_end - zones.absorbers.angle_start) * i / 60;
        const x = sign * R * Math.sin(a);
        const y = ch + R * Math.cos(a);
        zPts.push(`${tx(x).toFixed(1)},${ty(y).toFixed(1)}`);
      }
      svg += `<polyline points="${zPts.join(' ')}" fill="none" stroke="#d4a054" stroke-width="5" stroke-opacity="0.25" stroke-linecap="round"/>`;
    }

    // Zone labels (right side, outside dome)
    const diffMidA = (zones.diffusers.angle_start + zones.diffusers.angle_end) / 2;
    const diffLabelY = ty(ch + R * Math.cos(diffMidA));
    const labelX = tx(R) + 8;
    svg += `<text x="${labelX}" y="${diffLabelY}" fill="#6b8fc4" font-size="8" opacity="0.8" dominant-baseline="middle">${zones.diffusers.name.replace('Dome ','')}</text>`;

    const absMidA = (zones.absorbers.angle_start + zones.absorbers.angle_end) / 2;
    const absLabelY = ty(ch + R * Math.cos(absMidA));
    svg += `<text x="${labelX}" y="${absLabelY}" fill="#d4a054" font-size="8" opacity="0.7" dominant-baseline="middle">${zones.absorbers.name.replace('Dome ','')}</text>`;
  }

  // Floor
  svg += `<line x1="${tx(-fr)}" y1="${floorY}" x2="${tx(fr)}" y2="${floorY}" stroke="#4a3d5c" stroke-width="2"/>`;

  // Plenum
  svg += `<rect x="${tx(-fr)}" y="${floorY}" width="${fr*2*scale}" height="12" fill="#0c0a0f" stroke="#2a2435" stroke-width="0.5"/>`;

  // Ray segments
  const isElevated = scenario.source_height > 0.1;
  const rayColor = isElevated ? '#6db585' : '#c47070';
  for (const seg of scenario.rays) {
    const alpha = Math.max(0.03, Math.min(0.5, seg.e * 0.4));
    svg += `<line x1="${tx(seg.x0).toFixed(1)}" y1="${ty(seg.y0).toFixed(1)}" x2="${tx(seg.x1).toFixed(1)}" y2="${ty(seg.y1).toFixed(1)}" stroke="${rayColor}" stroke-width="0.5" stroke-opacity="${alpha.toFixed(2)}"/>`;
  }

  // Source
  const sy = scenario.source_height;
  svg += `<circle cx="${tx(0)}" cy="${ty(sy)}" r="5" fill="${rayColor}"/>`;
  const label = sy > 0 ? `Source (+${Math.round(sy*100)}cm)` : 'Source (floor)';
  svg += `<text x="${tx(0)+8}" y="${ty(sy)-5}" fill="${rayColor}" font-size="10" font-weight="600">${label}</text>`;

  // Elevated platform
  if (sy > 0.1) {
    svg += `<rect x="${tx(-0.5)}" y="${ty(sy)}" width="${1*scale}" height="${sy*scale}" fill="#1a3a2a" stroke="#27ae60" stroke-width="0.8" opacity="0.6"/>`;
  }

  // Center of sphere
  svg += `<circle cx="${tx(0)}" cy="${ty(ch)}" r="2" fill="#5ba5a5" opacity="0.4"/>`;

  // Dimensions
  svg += `<text x="${W/2}" y="${H-8}" text-anchor="middle" fill="#8a7d99" font-size="9">${room.floor_radius*2}m floor</text>`;

  svg += '</svg>';
  document.getElementById('ray-container').innerHTML = svg;
}

function drawRT60(room, scenario) {
  const W = 520, H = 180;
  const rt60 = scenario.rt60;
  const maxVal = Math.max(...rt60.values, room.target_rt60[1] * 1.3);
  const barW = 60, gap = 20;
  const startX = 50, baseY = H - 30;
  const scaleY = (baseY - 20) / maxVal;

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;

  // Target band
  const tMin = room.target_rt60[0], tMax = room.target_rt60[1];
  svg += `<rect x="40" y="${baseY - tMax * scaleY}" width="${W-60}" height="${(tMax-tMin)*scaleY}" class="target-band"/>`;
  svg += `<text x="${W-15}" y="${baseY - tMax * scaleY + 12}" fill="#6db585" font-size="8" text-anchor="end">${tMax}s</text>`;
  svg += `<text x="${W-15}" y="${baseY - tMin * scaleY - 3}" fill="#6db585" font-size="8" text-anchor="end">${tMin}s</text>`;

  // Bars
  for (let i = 0; i < rt60.freqs.length; i++) {
    const x = startX + i * (barW + gap);
    const val = rt60.values[i];
    const h = Math.min(val * scaleY, baseY - 20);
    const inTarget = val >= tMin && val <= tMax;
    const color = inTarget ? '#6db585' : (val < tMin ? '#6b8fc4' : '#c47070');

    svg += `<rect x="${x}" y="${baseY - h}" width="${barW}" height="${h}" fill="${color}" opacity="0.7" rx="2"/>`;
    svg += `<text x="${x + barW/2}" y="${baseY - h - 4}" text-anchor="middle" fill="${color}" font-size="9" font-weight="600">${val}s</text>`;
    svg += `<text x="${x + barW/2}" y="${baseY + 14}" text-anchor="middle" fill="#8a7d99" font-size="8">${rt60.freqs[i]}</text>`;
  }

  // Axis
  svg += `<line x1="40" y1="${baseY}" x2="${W-10}" y2="${baseY}" stroke="#2a2435" stroke-width="1"/>`;

  svg += '</svg>';
  document.getElementById('rt60-container').innerHTML = svg;

  // Description
  document.getElementById('scenario-desc').textContent = scenario.description;

  // Grid cells
  const grid = document.getElementById('rt60-grid');
  grid.innerHTML = '';
  for (let i = 0; i < rt60.freqs.length; i++) {
    const val = rt60.values[i];
    const tMin = room.target_rt60[0], tMax = room.target_rt60[1];
    const inTarget = val >= tMin && val <= tMax;
    const bg = inTarget ? 'rgba(109,181,133,0.1)' : (val < tMin ? 'rgba(107,143,196,0.1)' : 'rgba(196,112,112,0.1)');
    const color = inTarget ? '#6db585' : (val < tMin ? '#6b8fc4' : '#c47070');
    grid.innerHTML += `<div class="rt60-cell" style="background:${bg}"><div class="freq">${rt60.freqs[i]} Hz</div><div class="val" style="color:${color}">${val}s</div></div>`;
  }
}

function drawEnergy(room, scenario) {
  const W = 900, H = 160;
  const fe = scenario.floor_energy;
  const bins = fe.bins, energy = fe.energy;
  const maxE = Math.max(...energy) || 1;

  const padL = 40, padR = 20, padB = 25, padT = 10;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const scaleX = plotW / (room.floor_radius * 2);
  const scaleEn = plotH / maxE;

  function bx(x) { return padL + (x + room.floor_radius) * scaleX; }
  function ey(e) { return H - padB - e * scaleEn; }

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;

  // Axis
  svg += `<line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#2a2435" stroke-width="1"/>`;

  // Center line
  svg += `<line x1="${bx(0)}" y1="${padT}" x2="${bx(0)}" y2="${H-padB}" stroke="#2a2435" stroke-width="0.5" stroke-dasharray="4,4"/>`;
  svg += `<text x="${bx(0)}" y="${H-5}" text-anchor="middle" fill="#8a7d99" font-size="8">Center</text>`;

  // Energy curve
  const color = scenario.source_height > 0.1 ? '#6db585' : '#d4a054';
  let pathD = `M ${bx(bins[0]).toFixed(1)} ${ey(energy[0]).toFixed(1)}`;
  for (let i = 1; i < bins.length; i++) {
    pathD += ` L ${bx(bins[i]).toFixed(1)} ${ey(energy[i]).toFixed(1)}`;
  }
  // Fill
  svg += `<path d="${pathD} L ${bx(bins[bins.length-1]).toFixed(1)} ${H-padB} L ${bx(bins[0]).toFixed(1)} ${H-padB} Z" fill="${color}" opacity="0.1"/>`;
  svg += `<path d="${pathD}" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.7"/>`;

  // X labels
  for (let x = -Math.floor(room.floor_radius); x <= Math.floor(room.floor_radius); x += 2) {
    svg += `<text x="${bx(x)}" y="${H-5}" text-anchor="middle" fill="#8a7d99" font-size="8">${x}m</text>`;
  }

  svg += '</svg>';
  document.getElementById('energy-container').innerHTML = svg;
}

function updateStats(room, scenario) {
  const rt60 = scenario.rt60;
  const target = room.target_rt60;
  const mean = rt60.mean;
  const status = mean >= target[0] && mean <= target[1] ? '\u2714 In target' :
                 mean < target[0] ? '\u25BC Below target' : '\u25B2 Above target';
  const statusColor = mean >= target[0] && mean <= target[1] ? '#6db585' :
                      mean < target[0] ? '#6b8fc4' : '#c47070';

  document.getElementById('stats').innerHTML =
    `<strong>Mean RT60:</strong> ${mean}s &nbsp; <span style="color:${statusColor}">${status} (${target[0]}-${target[1]}s)</span><br>` +
    `<strong>Volume:</strong> ${room.volume} m\u00B3 &nbsp; | &nbsp; ` +
    `<strong>Dome:</strong> ${room.dome_area} m\u00B2 &nbsp; | &nbsp; ` +
    `<strong>Floor:</strong> ${room.floor_area} m\u00B2<br>` +
    `<strong>Source:</strong> ${scenario.source_height > 0 ? '+' + Math.round(scenario.source_height*100) + 'cm elevated' : 'Floor level'} &nbsp; | &nbsp; ` +
    `<strong>Method:</strong> ${rt60.method}`;
}

init();
</script>
</div>
